    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --main:#ff7979;
            --light:#ffcccc;
            --text:#333;
            --glass:rgba(255,255,255,0.25);
            --bg-color:linear-gradient(145deg,#fff5f5,#ffe8e8,#fff0f0);
        }
        body{
            min-height:100vh;
            font-family:"STSong",SimSun,serif;
            color:var(--text);
            overflow-x:hidden;
            transition:all 0.6s ease;
            cursor:pointer;
            padding-bottom:80px;
        }
        .nav{display:flex;justify-content:center;gap:12px;padding:25px 10px;flex-wrap:wrap;}
        .nav a{
            min-width:90px;text-align:center;padding:8px 16px;border-radius:30px;
            text-decoration:none;color:var(--text);background:var(--glass);
            backdrop-filter:blur(8px);transition:0.3s;font-size:15px;
        }
        .nav a.active{background:var(--main);color:#fff;}
        h1{text-align:center;color:var(--main);letter-spacing:4px;margin:15px 0;}
        .desc{text-align:center;color:#888;margin-bottom:25px;}
        .list-box{max-width:750px;margin:0 auto;padding:0 15px;column-count:2;column-gap:15px;}
        .item{
            break-inside:avoid;
            padding:12px 15px;margin:10px 0;
            background:#fff;border-radius:12px;box-shadow:0 2px 8px #00000012;
            cursor:pointer;transition:0.3s;font-size:14px;
        }
        .item:hover{transform:translateY(-3px);box-shadow:0 5px 15px #ff797935;}
        /* 弹窗样式 */
        .pop-mask{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.55);display:none;
            align-items:center;justify-content:center;z-index:999;
        }
        .pop-box{
            width:85%;max-width:500px;background:#fff;border-radius:20px;
            padding:25px;position:relative;animation:pop 0.3s;
        }
        @keyframes pop{0%{scale:0.8;opacity:0}100%{scale:1;opacity:1}}
        .close{
            position:absolute;top:15px;right:20px;font-size:22px;
            color:#999;cursor:pointer;
        }
        .pop-title{color:var(--main);font-size:18px;margin-bottom:15px;font-weight:bold;}
        .pop-text{line-height:1.8;color:#555;font-size:15px;}
        .random-pattern {
            position: fixed;z-index:-1;pointer-events:none;opacity:0.5;
        }
        @media (max-width:550px){.list-box{column-count:1;}}
    </style>
</head>

// 渲染100件小事
function renderThings(){
    let html = "";
    loveThings.forEach((item,idx)=>{
        html += `<div class="item" onclick="showText(${idx})">${idx+1}.${item.t}</div>`;
    })
    document.getElementById("thingList").innerHTML = html;
}
renderThings();

// 点击弹出对应短文
function showText(index){
    let data = loveThings[index];
    document.getElementById("popTitle").innerText = data.t;
    document.getElementById("popText").innerText = data.w;
    document.getElementById("popMask").style.display = "flex";
}
// 关闭弹窗
function closePop(){
    document.getElementById("popMask").style.display = "none";
}

// 全局点击换肤+漂浮图案
function changeThemeAndPattern(){
    document.querySelectorAll('.random-pattern').forEach(e=>e.remove());
    let hue=Math.floor(Math.random()*360);
    let root=document.documentElement;
    root.style.setProperty('--main',`hsl(${hue},65%,55%)`);
    root.style.setProperty('--light',`hsl(${hue},50%,80%)`);
    root.style.setProperty('--text',`hsl(${hue},25%,30%)`);
    root.style.setProperty('--bg-color',`linear-gradient(145deg,hsl(${hue},35%,95%),hsl(${hue},35%,90%),hsl(${hue},35%,93%))`);
    let icon=['❤','★','●','■','✧'];
    let num=Math.floor(Math.random()*8)+4;
    for(let i=0;i<num;i++){
        let d=document.createElement('div');
        d.className='random-pattern';
        d.innerText=icon[Math.floor(Math.random()*icon.length)];
        d.style.left=Math.random()*100+'%';
        d.style.top=Math.random()*100+'%';
        d.style.fontSize=(Math.random()*22+8)+'px';
        document.body.appendChild(d);
    }
}
const sty=document.createElement('style');
sty.innerHTML=`@keyframes float{0%{transform:translateY(0)rotate(0deg)}50%{transform:translateY(-20px)rotate(180deg)}100%{transform:translateY(0)rotate(360deg)}} .random-pattern{animation:float 3s linear infinite}`;
document.head.appendChild(sty);

// 本地存储key
const taskKey = "love_things_completed";
const commentKey = "love_page_comment";
let doneList = JSON.parse(localStorage.getItem(taskKey) || []);
let commentList = JSON.parse(localStorage.getItem(commentKey) || []);

// 分类起始下标
let startIndexDaily = 0;
let startIndexTravel = taskData.daily.length;
let startIndexRomantic = startIndexTravel + taskData.travel.length;
let startIndexFood = startIndexRomantic + taskData.romantic.length;
let startIndexFun = startIndexFood + taskData.food.length;

// 渲染单分类列表+配图
function renderSingleList(boxId, taskArr, startIdx){
    const box = document.getElementById(boxId);
    let html = "";
    taskArr.forEach((item, idx)=>{
        const realIdx = startIdx + idx;
        const isDone = doneList.includes(realIdx);
        html += `
        <div class="item" onclick="toggleTask(${realIdx})">
            <img class="item-img" src="${item.img}" alt="">
            <span class="item-text ${isDone?'done':''}">${realIdx+1}. ${item.txt}</span>
            <span class="check-icon ${isDone?'checked':''}">${isDone?'✓':''}</span>
        </div>
        `;
    });
    box.innerHTML = html;
}

// 切换打卡状态
function toggleTask(index){
    const pos = doneList.indexOf(index);
    if(pos > -1){
        doneList.splice(pos, 1);
    }else{
        doneList.push(index);
    }
    localStorage.setItem(taskKey, JSON.stringify(doneList));
    renderAllList();
}

// 更新进度数据
function updateProgress(){
    const total = taskData.daily.length + taskData.travel.length + taskData.romantic.length
                + taskData.food.length + taskData.fun.length;
    const finish = doneList.length;
    let percent = 0;
    if(total > 0){
        percent = Math.round((finish / total) * 100);
    }
    document.getElementById("totalNum").innerText = total;
    document.getElementById("finishNum").innerText = finish;
    document.getElementById("percent").innerText = percent;
    document.getElementById("progressBar").style.width = percent + "%";
}

// 渲染全部清单
function renderAllList(){
    renderSingleList("dailyList", taskData.daily, startIndexDaily);
    renderSingleList("travelList", taskData.travel, startIndexTravel);
    renderSingleList("romanticList", taskData.romantic, startIndexRomantic);
    renderSingleList("foodList", taskData.food, startIndexFood);
    renderSingleList("funList", taskData.fun, startIndexFun);
    updateProgress();
    renderComment();
}

// 评论相关
function addComment(){
    const input = document.getElementById("commentInput");
    const content = input.value.trim();
    if(!content){
        alert("评论内容不能为空");
        return;
    }
    const now = new Date();
    const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
    commentList.unshift({
        content:content,
        time:timeStr
    });
    localStorage.setItem(commentKey, JSON.stringify(commentList));
    input.value = "";
    renderComment();
}

function renderComment(){
    const box = document.getElementById("commentList");
    let html = "";
    if(commentList.length === 0){
        html = "<div style='text-align:center;color:#b89a67;padding:15px'>暂无评论，快来第一条留言吧</div>";
    }else{
        commentList.forEach(item=>{
            html += `
            <div class="comment-item">
                <p>${item.content}</p>
                <div class="comment-time">${item.time}</div>
            </div>
            `;
        });
    }
    box.innerHTML = html;
}

// 页面加载初始化
document.addEventListener("DOMContentLoaded", function(){
    renderAllList();
});

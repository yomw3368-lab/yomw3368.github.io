// 获取已完成列表
function getDoneList(){
    let data = localStorage.getItem(storageKey);
    return data ? JSON.parse(data) : [];
}
// 保存完成状态
function saveDoneList(list){
    localStorage.setItem(storageKey, JSON.stringify(list));
}
// 更新进度数据
function updateProgress(){
    const done = getDoneList();
    const doneNum = done.length;
    const percent = (doneNum / 100) * 100;
    document.getElementById("doneNum").innerText = doneNum;
    document.getElementById("progressBar").style.width = percent + "%";
}
// 渲染带图片列表
function renderList(){
    const wrap = document.getElementById("todoList");
    const doneArr = getDoneList();
    wrap.innerHTML = "";
    thingList.forEach((item, idx)=>{
        const num = idx + 1;
        const card = document.createElement("div");
        card.className = "item-card";
        if(doneArr.includes(num)){
            card.classList.add("finished");
        }
        card.innerHTML = `
            <img class="item-img" src="${item.img}" alt="">
            <div class="item-text">${num}.${item.text}</div>
        `;
        card.onclick = function(){
            let arr = getDoneList();
            if(arr.includes(num)){
                arr = arr.filter(item=>item!==num);
            }else{
                arr.push(num);
            }
            saveDoneList(arr);
            renderList();
            updateProgress();
            // 同步首页进度
            if(window.opener && !window.opener.closed){
                window.opener.updateProgress && window.opener.updateProgress();
            }
        }
        wrap.appendChild(card);
    })
    updateProgress();
}

window.onload = function(){
    renderList();
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百件小事 | 相恋主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .wrap{
            max-width:600px;
            margin:0 auto;
        }
        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:30px;
        }
        .list-box{
            border:1px solid #d4af37;
            border-radius:20px;
            padding:20px;
            background:rgba(212,175,55,0.1);
        }
        .item{
            display:flex;
            justify-content:space-between;
            padding:10px 0;
            border-bottom:1px solid rgba(212,175,55,0.2);
            font-size:1rem;
        }
        .finish{
            color:#88cc88;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="time.html">时光回忆</a>
        <a href="words.html" class="active">百件小事</a>
        <a href="note.html">私密心事</a>
        <a href="message.html">公开留言</a>
        <a href="privatemsg.html">隐秘留言</a>
        <a href="diary.html">恋爱日记</a>
    </div>

    <div class="wrap">
        <h2>一起完成的小事</h2>
        <div class="list-box" id="todoList">
        </div>
    </div>

<script>
const todoArr = [
    "一起看一次日出","牵手漫步街头","共享一顿晚餐","并肩看一场电影",
    "互相写下告白话语","短途结伴出行","合照留存美好瞬间"
];
const key = "love_things_completed";
let doneList = JSON.parse(localStorage.getItem(key) || []);

function renderList(){
    let html = "";
    todoArr.forEach((item,idx)=>{
        let isDone = doneList.includes(idx);
        html += `
        <div class="item">
            <span>${idx+1}.${item}</span>
            <span class="${isDone?'finish':''}">${isDone?'已完成':'待完成'}</span>
        </div>
        `;
    })
    document.getElementById("todoList").innerHTML = html;
}
window.onload = renderList;
</script>
</body>
</html>

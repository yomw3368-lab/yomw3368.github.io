<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百件小事</title>
    <style>
        /* 全局样式与基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f9fa;
            color: #333;
            min-height: 100vh;
            padding: 20px 15px;
            transition: background 0.3s, color 0.3s;
        }
        /* 导航栏 */
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #666;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .nav a.active {
            background: #7b68ee;
            color: white;
        }
        /* 主题切换 */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #7b68ee;
            background: white;
            cursor: pointer;
            z-index: 99;
        }
        /* 标题与说明 */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .title h1 {
            font-size: 2.2rem;
            color: #7b68ee;
            margin-bottom: 10px;
        }
        .title p {
            color: #888;
            font-size: 1.1rem;
        }
        /* 进度条 */
        .progress-container {
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 0 10px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #7b68ee;
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            margin-top: 8px;
            color: #7b68ee;
            font-weight: 500;
        }
        /* 小事列表 */
        .list-container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .item {
            background: white;
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(123, 104, 238, 0.2);
        }
        .item.completed {
            background: #f0f8ff;
            border-left: 4px solid #7b68ee;
        }
        .item .check-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .item.completed .check-icon {
            background: #7b68ee;
            border-color: #7b68ee;
            color: white;
        }
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.show .modal {
            transform: scale(1);
        }
        .modal .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-title {
            font-size: 1.3rem;
            color: #7b68ee;
            margin-bottom: 15px;
            padding-right: 30px;
        }
        .modal-content {
            line-height: 1.8;
            color: #555;
        }
        /* 重置按钮 */
        .reset-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 25px;
            border: 2px solid #7b68ee;
            background: white;
            color: #7b68ee;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .reset-btn:hover {
            background: #7b68ee;
            color: white;
        }
        /* 漂浮爱心 */
        .heart {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            color: #ff6b8b;
            animation: float 6s linear infinite;
            opacity: 0.7;
        }
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        /* 深色模式适配 */
        body.dark {
            background: #1a1a2e;
            color: #eee;
        }
        body.dark .nav a {
            color: #aaa;
        }
        body.dark .title p {
            color: #aaa;
        }
        body.dark .item {
            background: #2a2a4e;
            color: #eee;
        }
        body.dark .modal {
            background: #2a2a4e;
            color: #eee;
        }
        body.dark .modal-content {
            color: #ccc;
        }
        body.dark .modal .close-btn {
            background: #3a3a5e;
            color: #eee;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="memory.html">时光回忆</a>
        <a href="words.html" class="active">百件小事</a>
        <a href="secret.html">私密心事</a>
        <a href="public.html">公开留言</a>
        <a href="hidden.html">隐秘留言</a>
    </div>

    <!-- 主题切换按钮 -->
    <div class="theme-switch" id="themeSwitch"></div>

    <!-- 标题区域 -->
    <div class="title">
        <h1>和你一起完成的一百件小事</h1>
        <p>点击任意一件小事，查看专属浪漫文案</p>
    </div>

    <!-- 进度条 -->
    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">已完成 0/100</div>
    </div>

    <!-- 小事列表 -->
    <div class="list-container" id="listContainer">
        <!-- 这里放100件小事，示例先放前7件，你可以直接替换成完整的100条 -->
        <div class="item" data-id="1" data-text="一起看一次日出">
            <div class="check-icon">✓</div>
            <span>1. 一起看一次日出</span>
        </div>
        <div class="item" data-id="2" data-text="牵手漫步傍晚街头">
            <div class="check-icon">✓</div>
            <span>2. 牵手漫步傍晚街头</span>
        </div>
        <div class="item" data-id="3" data-text="一起吃一碗热汤面">
            <div class="check-icon">✓</div>
            <span>3. 一起吃一碗热汤面</span>
        </div>
        <div class="item" data-id="4" data-text="并肩看漫天晚霞">
            <div class="check-icon">✓</div>
            <span>4. 并肩看漫天晚霞</span>
        </div>
        <div class="item" data-id="5" data-text="互相给对方拍照">
            <div class="check-icon">✓</div>
            <span>5. 互相给对方拍照</span>
        </div>
        <div class="item" data-id="6" data-text="深夜一起谈心聊天">
            <div class="check-icon">✓</div>
            <span>6. 深夜一起谈心聊天</span>
        </div>
        <div class="item" data-id="7" data-text="一起淋雨漫步街头">
            <div class="check-icon">✓</div>
            <span>7. 一起淋雨漫步街头</span>
        </div>
        <!-- 把剩下的93件小事按同样格式加在这里 -->
    </div>

    <!-- 重置按钮 -->
    <button class="reset-btn" id="resetBtn">重置所有进度</button>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-btn" id="closeModal">×</button>
            <h3 class="modal-title" id="modalTitle"></h3>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script>
        // 1. 文案数据（示例，可自行补充）
        const contentMap = {
            1: "天还没亮，我们就裹着同一件外套，坐在山顶等第一缕光。当太阳跳出地平线的那一刻，我转头看你，发现你眼里的光比日出还要亮。原来浪漫不是看风景，是身边站着你。",
            2: "傍晚的风带着温柔，我们牵着不用松开的手，慢慢走在路灯下。影子被拉得很长，就像我们的路，想和你这样一直走下去，从黄昏到白头。",
            3: "冷的时候，一碗热汤面就能治愈所有疲惫。更治愈的是，你坐在对面，把第一口面夹给我，说‘多吃点，暖一点’。原来最温暖的不是汤面，是和你一起吃的每一顿饭。",
            4: "晚霞把天空染成橘子汽水色，我们并肩坐着不说话，却觉得无比安心。原来最好的风景，是和你一起看的每一次晚霞，因为身边的人，才是风景里的主角。",
            5: "镜头里的你，笑起来眼睛弯弯的，比任何风景都好看。原来拍照的意义，不是留住瞬间，是留住和你在一起的每一份心动，等老了慢慢翻出来看。",
            6: "深夜的房间很安静，我们聊着小时候的事，聊着未来的计划，聊着那些没说出口的小情绪。原来被人认真倾听、被人懂的感觉，这么好。谢谢你愿意陪我聊到天亮。",
            7: "雨不大，我们撑着一把伞，踩过水洼，笑着跑过街头。衣服湿了一点，头发乱了一点，但心里却很暖。原来和你一起淋雨，连狼狈都变成了浪漫。"
            // 补充剩下的文案，key和data-id对应即可
        };

        // 2. 本地存储相关
        const completedKey = "love_things_completed";
        let completedList = JSON.parse(localStorage.getItem(completedKey) || "[]");

        // 3. 初始化完成状态
        function initCompleted() {
            document.querySelectorAll(".item").forEach(item => {
                const id = item.dataset.id;
                if (completedList.includes(id)) {
                    item.classList.add("completed");
                }
            });
            updateProgress();
        }

        // 4. 更新进度条
        function updateProgress() {
            const total = document.querySelectorAll(".item").length;
            const completed = completedList.length;
            const percent = (completed / total) * 100;
            document.getElementById("progressFill").style.width = `${percent}%`;
            document.getElementById("progressText").textContent = `已完成 ${completed}/${total}`;
        }

        // 5. 点击小事弹窗+标记完成
        document.querySelectorAll(".item").forEach(item => {
            item.addEventListener("click", function(e) {
                const id = this.dataset.id;
                const text = this.dataset.text;
                const content = contentMap[id] || "这件小事，等我们一起完成的时候，再写下属于我们的专属文案吧~";

                // 打开弹窗
                document.getElementById("modalTitle").textContent = `${id}. ${text}`;
                document.getElementById("modalContent").textContent = content;
                document.getElementById("modalOverlay").classList.add("show");

                // 标记完成（已完成则取消）
                if (!completedList.includes(id)) {
                    completedList.push(id);
                    this.classList.add("completed");
                } else {
                    completedList = completedList.filter(i => i !== id);
                    this.classList.remove("completed");
                }
                localStorage.setItem(completedKey, JSON.stringify(completedList));
                updateProgress();
            });
        });

        // 6. 关闭弹窗
        document.getElementById("closeModal").addEventListener("click", () => {
            document.getElementById("modalOverlay").classList.remove("show");
        });
        document.getElementById("modalOverlay").addEventListener("click", (e) => {
            if (e.target === document.getElementById("modalOverlay")) {
                document.getElementById("modalOverlay").classList.remove("show");
            }
        });

        // 7. 重置进度
        document.getElementById("resetBtn").addEventListener("click", () => {
            if (confirm("确定要重置所有进度吗？已标记的完成状态会被清空哦~")) {
                completedList = [];
                localStorage.setItem(completedKey, JSON.stringify(completedList));
                document.querySelectorAll(".item").forEach(item => {
                    item.classList.remove("completed");
                });
                updateProgress();
            }
        });

        // 8. 主题切换
        let isDark = false;
        document.getElementById("themeSwitch").addEventListener("click", () => {
            isDark = !isDark;
            document.body.classList.toggle("dark", isDark);
        });

        // 9. 漂浮爱心
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤";
            heart.style.left = `${Math.random() * 100}vw`;
            heart.style.animationDuration = `${5 + Math.random() * 5}s`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 12000);
        }
        setInterval(createHeart, 1500);

        // 初始化
        initCompleted();
    </script>
</body>
</html>

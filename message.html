<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公开留言 | 温柔寄语</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --main:#6c5ce7;
            --light:#a29bfe;
            --text:#2d3436;
            --glass:rgba(255,255,255,0.25);
            --bg-color: linear-gradient(145deg,#f5f6fa,#e8eaf6,#dfe6ff);
        }
        body.morning{background:var(--bg-color);}
        body.noon{background:var(--bg-color);}
        body.night{background:var(--bg-color);}
        body.deepnight{background:var(--bg-color);}
        body{
            min-height:100vh;
            font-family:"STSong", "SimSun", "serif";
            color:var(--text);
            overflow-x:hidden;opacity:0;animation:nobleFade 1.5s cubic-bezier(0.22,1,0.36,1) forwards;transition:all 0.6s ease;
            cursor: pointer;
        }
        @keyframes nobleFade{0%{opacity:0;transform:translateY(30px) scale(0.98);}100%{opacity:1;transform:translateY(0) scale(1);}}
        #partCanvas{position:fixed;inset:0;z-index:-2;pointer-events:none;}
        .nav{display:flex;justify-content:center;gap:12px;padding:25px 10px;flex-wrap:wrap;}
        .nav a{flex:0 1 auto;min-width:90px;text-align:center;padding:8px 16px;border-radius:30px;
        text-decoration:none;color:var(--text);background:var(--glass);backdrop-filter:blur(8px);transition:0.3s;font-size:15px;}
        .nav a.active{background:var(--main);color:#fff;}
        h1{text-align:center;color:var(--main);letter-spacing:5px;margin:20px 0;}
        .divider{width:80%;max-width:400px;height:1px;background:linear-gradient(90deg,transparent,var(--main),transparent);margin:15px auto 25px;}
        .page-say{text-align:center;color:var(--main);margin:10px 0;font-size:16px;}
        .box{max-width:600px;margin:30px auto;padding:20px;background:var(--glass);backdrop-filter:blur(10px);border-radius:20px;border:1px solid rgba(255,255,255,0.4);}
        textarea{width:100%;height:120px;padding:15px;border-radius:15px;border:none;outline:none;background:rgba(255,255,255,0.7);font-size:15px;resize:none;}
        .btn{margin-top:15px;padding:10px 25px;background:var(--main);color:#fff;border:none;border-radius:30px;cursor:pointer;}
        .list{max-width:600px;margin:30px auto;padding:0 20px;}
        .item{padding:15px;margin:15px 0;background:var(--glass);backdrop-filter:blur(10px);border-radius:15px;border:1px solid rgba(255,255,255,0.4);}
        .item p{margin:0 0 8px;}
        .item time{font-size:12px;color:#636e72;}
        .foot{text-align:center;margin:60px 0 30px;font-size:14px;color:#636e72;}
        .random-pattern {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body id="msgBody" onclick="changeThemeAndPattern()">
<canvas id="partCanvas"></canvas>
<div class="nav">
    <a href="index.html">相恋首页</a>
    <a href="time.html">时光回忆</a>
    <a href="words.html">百件小事</a>
    <a href="note.html">私密心事</a>
    <a href="message.html" class="active">公开留言</a>
</div>
<h1>公开留言 · 温柔寄语</h1>
<div class="divider"></div>
<div class="page-say" id="msgGreet"></div>

<div class="box">
    <textarea id="msgInput" placeholder="写下想对你说的话，公开留言～"></textarea>
    <button class="btn" onclick="sendMsg()">发送留言</button>
</div>

<div class="list" id="msgList"></div>
<div class="foot">每一句留言，都是温柔的印记</div>

<audio id="bgAudio" loop><source src="https://music.163.com/song/media/outer/url?id=1901371911.mp3">
<script>
const msgWish = ["留言传情，温暖相伴","字字真心，皆是温柔"];
function setMsgTime(){
    let h=new Date().getHours();
    let b=document.getElementById("msgBody");
    let g=document.getElementById("msgGreet");
    if(h>=5&&h<9){b.className="morning";g.innerText="清晨美好，留言寄语";}
    else if(h>=9&&h<17){b.className="noon";g.innerText=msgWish[Math.floor(Math.random()*msgWish.length)];}
    else if(h>=17&&h<23){b.className="night";g.innerText="夜色温柔，留下心语";}
    else{b.className="deepnight";g.innerText="夜深静谧，轻声留言";}
}
setMsgTime();
const audio=document.getElementById("bgAudio");audio.volume=0.25;
document.addEventListener("click",()=>audio.play().catch(e=>{}),{once:true});
const canvas=document.getElementById("partCanvas"),ctx=canvas.getContext("2d");
let particles=[];
function setSize(){canvas.width=innerWidth;canvas.height=innerHeight;initPart();}
function initPart(){particles=[];for(let i=0;i<150;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.4,sx:Math.random()*0.2-0.1,sy:Math.random()*0.2-0.1,color:Math.random()>0.5?"#a29bfe":"#dfe6ff"});}
function drawPart(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();p.x+=p.sx;p.y+=p.sy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});
requestAnimationFrame(drawPart);}
addEventListener("resize",setSize);setSize();drawPart();

// 留言功能
function getMsgs(){return JSON.parse(localStorage.getItem("publicMsgs")) || [];}
function saveMsgs(arr){localStorage.setItem("publicMsgs",JSON.stringify(arr));}
function sendMsg(){
    let text=document.getElementById("msgInput").value.trim();
    if(!text){alert("留言不能为空～");return;}
    let now=new Date();
    let timeStr=`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
    let arr=getMsgs();
    arr.unshift({text,time:timeStr});
    saveMsgs(arr);
    document.getElementById("msgInput").value="";
    renderMsgs();
}
function renderMsgs(){
    let data=getMsgs();
    let html=data.length===0?'<div style="text-align:center;color:#636e72;padding:20px;">暂无留言，快来抢沙发～</div>':"";
    data.forEach(item=>{
        html += `<div class="item"><p>${item.text}</p><time>${item.time}</time></div>`;
    });
    document.getElementById("msgList").innerHTML=html;
}
renderMsgs();

// 随机配色和图案生成函数
function changeThemeAndPattern() {
    document.querySelectorAll('.random-pattern').forEach(el => el.remove());
    const randomHue=Math.floor(Math.random()*360);
    const mainColor=`hsl(${randomHue}, 70%, 50%)`;
    const lightColor=`hsl(${randomHue}, 80%, 80%)`;
    const textColor=`hsl(${randomHue}, 20%, 30%)`;
    const bgColor1=`hsl(${randomHue}, 30%, 90%)`;
    const bgColor2=`hsl(${randomHue}, 30%, 95%)`;
    const bgColor3=`hsl(${randomHue}, 30%, 85%)`;

    const root=document.documentElement;
    root.style.setProperty('--main', mainColor);
    root.style.setProperty('--light', lightColor);
    root.style.setProperty('--text', textColor);
    root.style.setProperty('--bg-color', `linear-gradient(145deg, ${bgColor1}, ${bgColor2}, ${bgColor3})`);

    const patterns=['star','heart','circle','square'];
    const patternCount=Math.floor(Math.random()*10)+5;

    for(let i=0;i<patternCount;i++){
        const pattern=document.createElement('div');
        pattern.classList.add('random-pattern');
        const patternType=patterns[Math.floor(Math.random()*patterns.length)];
        switch(patternType){
            case 'star':pattern.innerHTML='★';break;
            case 'heart':pattern.innerHTML='❤';break;
            case 'circle':pattern.innerHTML='●';break;
            case 'square':pattern.innerHTML='■';break;
        }
        pattern.style.left=Math.random()*100+'%';
        pattern.style.top=Math.random()*100+'%';
        pattern.style.fontSize=Math.random()*30+10+'px';
        pattern.style.color=lightColor;
        pattern.style.animation=`float ${Math.random()*3+2}s linear infinite`;
        document.body.appendChild(pattern);
    }
}

const style=document.createElement('style');
style.textContent=`
    @keyframes float {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(180deg); }
        100% { transform: translateY(0) rotate(360deg); }
    }
`;
document.head.appendChild(style);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公开留言 | 相恋主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .main{
            max-width:600px;
            margin:0 auto;
        }
        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:30px;
        }
        .input-area{
            margin-bottom:25px;
        }
        textarea{
            width:100%;
            height:120px;
            background:rgba(0,0,0,0.2);
            border:1px solid #d4af37;
            border-radius:15px;
            padding:12px;
            color:#d4af37;
            outline:none;
        }
        .send-btn{
            margin-top:10px;
            padding:8px 25px;
            background:#d4af37;
            color:#2b221a;
            border:none;
            border-radius:20px;
            cursor:pointer;
        }
        .msg-item{
            border:1px solid rgba(212,175,55,0.3);
            border-radius:12px;
            padding:15px;
            margin-bottom:12px;
            background:rgba(212,175,55,0.08);
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="time.html">时光回忆</a>
        <a href="words.html">百件小事</a>
        <a href="note.html">私密心事</a>
        <a href="message.html" class="active">公开留言</a>
        <a href="privatemsg.html">隐秘留言</a>
        <a href="diary.html">恋爱日记</a>
    </div>

    <div class="main">
        <h2>暖心留言板</h2>
        <div class="input-area">
            <textarea id="msgText" placeholder="留下你的心意话语"></textarea>
            <button class="send-btn" onclick="addMsg()">提交留言</button>
        </div>
        <div id="msgList"></div>
    </div>

<script>
const msgKey = "public_message";
function getMsg(){
    return JSON.parse(localStorage.getItem(msgKey) || "[]");
}
function renderMsg(){
    let list = getMsg();
    let html = "";
    list.forEach(item=>{
        html += `<div class="msg-item">${item}</div>`;
    })
    document.getElementById("msgList").innerHTML = html;
}
function addMsg(){
    let val = document.getElementById("msgText").value.trim();
    if(!val)return alert("内容不能为空");
    let arr = getMsg();
    arr.push(val);
    localStorage.setItem(msgKey,JSON.stringify(arr));
    document.getElementById("msgText").value = "";
    renderMsg();
}
window.onload = renderMsg;
</script>
</body>
</html>

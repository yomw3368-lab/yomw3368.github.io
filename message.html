<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公开留言 | 温柔寄语</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --main:#6c5ce7;
            --light:#a29bfe;
            --text:#2d3436;
            --glass:rgba(255,255,255,0.25);
            --bg-color: linear-gradient(145deg,#f5f6fa,#e8eaf6,#dfe6ff);
        }
        body{
            min-height:100vh;
            font-family:"STSong",SimSun,serif;
            color:var(--text);
            overflow-x:hidden;
            transition:all 0.6s ease;
            cursor:pointer;
        }
        .nav{display:flex;justify-content:center;gap:12px;padding:25px 10px;flex-wrap:wrap;}
        .nav a{
            min-width:90px;text-align:center;padding:8px 16px;border-radius:30px;
            text-decoration:none;color:var(--text);background:var(--glass);
            backdrop-filter:blur(8px);transition:0.3s;font-size:15px;
        }
        .nav a.active{background:var(--main);color:#fff;}
        h1{text-align:center;color:var(--main);letter-spacing:5px;margin:20px 0;}
        .divider{width:80%;max-width:400px;height:1px;background:linear-gradient(90deg,transparent,var(--main),transparent);margin:15px auto 20px;}
        .tip{text-align:center;color:var(--main);margin-bottom:25px;}
        .box{max-width:600px;margin:0 auto 30px;padding:20px;background:var(--glass);border-radius:20px;}
        textarea{width:100%;height:120px;padding:15px;border:none;outline:none;border-radius:15px;background:rgba(255,255,255,0.7);resize:none;font-size:15px;}
        .btn{margin-top:15px;padding:10px 25px;background:var(--main);color:#fff;border:none;border-radius:30px;cursor:pointer;}
        .list{max-width:600px;margin:0 auto;padding:0 15px;}
        .msg-item{padding:15px;margin:15px 0;background:var(--glass);border-radius:15px;}
        .msg-time{font-size:12px;color:#666;margin-top:8px;}
        .empty{text-align:center;padding:30px;color:#777;}
        .random-pattern {
            position: fixed;z-index:-1;pointer-events:none;opacity:0.6;
        }
    </style>
</head>
<body onclick="changeThemeAndPattern()">
<div class="nav">
    <a href="index.html">相恋首页</a>
    <a href="time.html">时光回忆</a>
    <a href="words.html">百件小事</a>
    <a href="note.html">私密心事</a>
    <a href="message.html" class="active">公开留言</a>
    <a href="javascript:goPrivate()">隐秘留言</a>
</div>

<h1>公开温柔留言</h1>
<div class="divider"></div>
<div class="tip">写下暖心话语，留存美好</div>

<div class="box">
    <textarea id="msgInput" placeholder="在此写下留言..."></textarea>
    <button class="btn" onclick="sendMsg()">发送留言</button>
</div>

<div class="list" id="msgList"></div>

<script>
function getMsgs(){return JSON.parse(localStorage.getItem("publicMsgs"))||[];}
function saveMsgs(arr){localStorage.setItem("publicMsgs",JSON.stringify(arr));}
function sendMsg(){
    let t=document.getElementById("msgInput").value.trim();
    if(!t){alert("留言不能为空");return;}
    let d=new Date();
    let time=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
    let arr=getMsgs();
    arr.unshift({text:t,time:time});
    saveMsgs(arr);
    document.getElementById("msgInput").value="";
    renderMsgs();
}
function renderMsgs(){
    let arr=getMsgs();
    let html="";
    if(arr.length<=0)html='<div class="empty">暂无留言，快来第一条</div>';
    else arr.forEach(v=>html+=`<div class="msg-item"><p>${v.text}</p><div class="msg-time">${v.time}</div></div>`);
    document.getElementById("msgList").innerHTML=html;
}
renderMsgs();

// 换主题图案
function changeThemeAndPattern(){
    document.querySelectorAll('.random-pattern').forEach(e=>e.remove());
    let hue=Math.floor(Math.random()*360);
    let root=document.documentElement;
    root.style.setProperty('--main',`hsl(${hue},65%,55%)`);
    root.style.setProperty('--light',`hsl(${hue},50%,80%)`);
    root.style.setProperty('--text',`hsl(${hue},25%,30%)`);
    root.style.setProperty('--bg-color',`linear-gradient(145deg,hsl(${hue},35%,90%),hsl(${hue},35%,95%),hsl(${hue},35%,85%))`);
    let icon=['❤','★','●','■','✧'];
    let num=Math.floor(Math.random()*8)+4;
    for(let i=0;i<num;i++){
        let d=document.createElement('div');
        d.className='random-pattern';
        d.innerText=icon[Math.floor(Math.random()*icon.length)];
        d.style.left=Math.random()*100+'%';
        d.style.top=Math.random()*100+'%';
        d.style.fontSize=(Math.random()*22+8)+'px';
        document.body.appendChild(d);
    }
}
const sty=document.createElement('style');
sty.innerHTML=`@keyframes float{0%{transform:translateY(0)rotate(0deg)}50%{transform:translateY(-20px)rotate(180deg)}100%{transform:translateY(0)rotate(360deg)}} .random-pattern{animation:float 3s linear infinite}`;
document.head.appendChild(sty);

// 权限跳转
function goPrivate(){
    let s=localStorage.getItem("privateOpen");
    if(s==="1")location.href="privatemsg.html";
    else{alert("请先去首页输入专属暗号解锁！");location.href="index.html";}
}
</script>
</body>
</html>

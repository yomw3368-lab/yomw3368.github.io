<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密心事 | 相恋主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .box{
            max-width:600px;
            margin:0 auto;
        }
        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:30px;
        }
        textarea{
            width:100%;
            height:200px;
            background:rgba(0,0,0,0.2);
            border:1px solid #d4af37;
            border-radius:15px;
            padding:15px;
            color:#d4af37;
            font-size:1rem;
            outline:none;
            resize:none;
        }
        .btn{
            margin-top:15px;
            padding:10px 30px;
            background:#d4af37;
            color:#2b221a;
            border:none;
            border-radius:25px;
            cursor:pointer;
            font-size:1rem;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="time.html">时光回忆</a>
        <a href="words.html">百件小事</a>
        <a href="note.html" class="active">私密心事</a>
        <a href="message.html">公开留言</a>
        <a href="privatemsg.html">隐秘留言</a>
        <a href="diary.html">恋爱日记</a>
    </div>

    <div class="box">
        <h2>写下专属心事</h2>
        <textarea id="noteArea" placeholder="把心里话悄悄记录在这里..."></textarea>
        <button class="btn" onclick="saveNote()">保存心事</button>
    </div>

<script>
const noteKey = "private_note";
window.onload = function(){
    let old = localStorage.getItem(noteKey) || "";
    document.getElementById("noteArea").value = old;
}
function saveNote(){
    let content = document.getElementById("noteArea").value;
    localStorage.setItem(noteKey,content);
    alert("心事保存成功~");
}
</script>
</body>
</html>

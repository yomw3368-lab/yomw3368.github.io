<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人心事卷宗 | 独藏心语</title>
    <style>
        *{margin: 0; padding: 0; box-sizing: border-box;}
        :root{
            --gold: #d4af37;
            --deep: #1c1710;
            --soft-gold: #e6d2a8;
            --trans: rgba(212,175,55,0.15);
        }
        body.morning{background:linear-gradient(160deg,#282014,#33291b,#3e3222);}
        body.noon{background:linear-gradient(160deg,#2f2518,#3c3020,#493b28);}
        body.night{background:linear-gradient(160deg,#1c1710,#2b2216,#352a1c);}
        body.deepnight{background:linear-gradient(160deg,#140f08,#1e170e,#281f13);}
        body{
            min-height: 100vh;
            font-family: "宋体",serif;
            color: var(--soft-gold);
            overflow-x: hidden;
        }
        .bg-dot{
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(var(--trans) 1px,transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
        .main-nav{
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 28px 15px;
            flex-wrap: wrap;
        }
        .main-nav a{
            text-decoration: none;
            color: var(--soft-gold);
            padding: 7px 16px;
            border-radius: 25px;
            border: 1px solid rgba(212,175,55,0.3);
            background: rgba(255,255,255,0.05);
            font-size: 14px;
            transition: 0.3s ease;
        }
        .main-nav a.active{
            background: var(--gold);
            color: #1c1710;
            border-color: var(--gold);
        }
        .main-nav a:hover{
            background: rgba(212,175,55,0.25);
        }
        .page-title{
            text-align: center;
            margin: 10px 0 20px;
        }
        .page-title h2{
            color: var(--gold);
            letter-spacing: 6px;
            font-weight: normal;
        }
        .line-split{
            width: 60%;
            height: 1px;
            margin: 12px auto;
            background: linear-gradient(90deg,transparent,var(--gold),transparent);
        }
        .note-say{text-align:center;color:var(--gold);margin:8px 0;}
        .lock-box{
            max-width: 580px;
            margin: 25px auto;
            padding: 20px;
            background: rgba(0,0,0,0.25);
            border-radius: 18px;
            border: 1px solid rgba(212,175,55,0.25);
            text-align: center;
        }
        .lock-tip{
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 15px;
        }
        .lock-input{
            padding: 9px 15px;
            width: 65%;
            background: rgba(255,255,255,0.08);
            border: none;
            outline: none;
            border-radius: 22px;
            color: var(--soft-gold);
            text-align: center;
            font-size: 15px;
        }
        .lock-btn{
            margin-left: 10px;
            padding: 9px 20px;
            background: var(--gold);
            color: #1c1710;
            border: none;
            border-radius: 22px;
            cursor: pointer;
        }
        .skip-btn{
            margin-top:12px;
            padding:8px 18px;
            background:rgba(212,175,55,0.2);
            color:var(--soft-gold);
            border:none;
            border-radius:22px;
            cursor:pointer;
        }
        .write-wrap{
            max-width: 580px;
            margin: 0 auto 30px;
            padding: 22px;
            background: rgba(212,175,55,0.08);
            border-radius: 20px;
            border: 1px solid rgba(212,175,55,0.2);
            display: none;
        }
        .write-top{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap:10px;
        }
        .note-tag{
            padding:5px 12px;
            border-radius:15px;
            background:rgba(212,175,55,0.15);
            font-size:13px;
        }
        textarea{
            width: 100%;
            height: 130px;
            background: rgba(0,0,0,0.15);
            border: none;
            outline: none;
            padding: 14px;
            border-radius: 15px;
            color: var(--soft-gold);
            font-size: 15px;
            line-height: 1.8;
            resize: none;
        }
        .btn-group{
            margin-top:15px;
            display:flex;
            gap:12px;
        }
        .save-btn{
            padding:8px 22px;
            background:var(--gold);
            color:#1c1710;
            border:none;
            border-radius:20px;
            cursor:pointer;
        }
        .top-btn{
            padding:8px 22px;
            background:rgba(212,175,55,0.2);
            color:var(--soft-gold);
            border:none;
            border-radius:20px;
            cursor:pointer;
        }
        .note-container{
            max-width:580px;
            margin:0 auto 50px;
            padding:0 15px;
            display:none;
        }
        .single-note{
            padding:18px;
            background:rgba(0,0,0,0.2);
            border-radius:16px;
            margin-bottom:16px;
            border-left:3px solid var(--gold);
            position:relative;
        }
        .note-type{
            font-size:13px;
            color:var(--gold);
            margin-bottom:8px;
        }
        .note-content{
            line-height:1.8;
            font-size:15px;
        }
        .note-date{
            margin-top:10px;
            font-size:12px;
            color:#b9a786;
        }
        .operate{
            position:absolute;
            right:15px;
            top:15px;
            font-size:13px;
            color:#b9a786;
            cursor:pointer;
        }
        .foot-text{
            text-align:center;
            font-size:13px;
            color:#948265;
            padding:30px 0;
        }
    </style>
</head>
<body id="noteBody">
<div class="bg-dot"></div>

<div class="main-nav">
    <a href="index.html">相恋首页</a>
    <a href="time.html">时光回忆</a>
    <a href="words.html">百件小事</a>
    <a href="note.html" class="active">私人卷宗</a>
    <a href="message.html">公开留言</a>
    <a href="privatemsg.html">隐秘留言</a>
</div>

<div class="page-title">
    <h2>私人心事卷宗</h2>
    <div class="line-split"></div>
</div>
<div class="note-say" id="noteGreet"></div>

<div class="lock-box" id="lockArea">
    <div class="lock-tip">输入专属翻阅密码，开启私人心事</div>
    <input class="lock-input" id="lookPwd" placeholder="输入翻阅密码">
    <button class="lock-btn" onclick="unLockNote()">解锁翻阅</button>
    <br>
    <button class="skip-btn" onclick="skipPwd()">暂无密码 直接跳过</button>
</div>

<div class="write-wrap" id="writeArea">
    <div class="write-top">
        <span class="note-tag">心情寄语</span>
        <select id="noteClass" style="background:rgba(0,0,0,0.2);color:var(--soft-gold);border:none;padding:4px 8px;border-radius:10px;">
            <option value="日常随笔">日常随笔</option>
            <option value="心底秘密">心底秘密</option>
            <option value="未来期许">未来期许</option>
            <option value="独处感悟">独处感悟</option>
        </select>
    </div>
    <textarea id="noteInput" placeholder="写下只属于自己的心声，封存此间情绪..."></textarea>
    <div class="btn-group">
        <button class="save-btn" onclick="storeNote()">封存心事</button>
        <button class="top-btn" onclick="clearInput()">清空文稿</button>
    </div>
</div>

<div class="note-container" id="noteListBox"></div>

<div class="foot-text">世间万般言语，不及心底一字真情</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://music.163.com/song/media/outer/url?id=1901371911.mp3">

<script>
const viewPassword = "99";
const noteWish = ["心藏温柔，静守本心","沉淀思绪，安然度日"];
function setNoteTime(){
    let h=new Date().getHours();
    let b=document.getElementById("noteBody");
    let g=document.getElementById("noteGreet");
    if(h>=5&&h<9){b.className="morning";g.innerText="清晨静心，书写心绪";}
    else if(h>=9&&h<17){b.className="noon";g.innerText=noteWish[Math.floor(Math.random()*noteWish.length)];}
    else if(h>=17&&h<23){b.className="night";g.innerText="夜色安然，诉说心底话语";}
    else{b.className="deepnight";g.innerText="夜深人静，别熬太晚啦";}
}
setNoteTime();
const music = document.getElementById("bgMusic");
music.volume = 0.2;
document.addEventListener("click",()=>music.play().catch(e=>{}),{once:true});
function unLockNote(){
    let pwd = document.getElementById("lookPwd").value.trim();
    pwd===viewPassword?openAll():(alert("翻阅密码错误"),document.getElementById("lookPwd").value="");
}
function skipPwd(){openAll();}
function openAll(){
    document.getElementById("lockArea").style.display = "none";
    document.getElementById("writeArea").style.display = "block";
    document.getElementById("noteListBox").style.display = "block";
    renderAllNote();
}
function getLocalNote(){return JSON.parse(localStorage.getItem("ownPrivateNoteBook")) || [];}
function saveLocalNote(arr){localStorage.setItem("ownPrivateNoteBook",JSON.stringify(arr));}
function storeNote(){
    let text = document.getElementById("noteInput").value.trim();
    let type = document.getElementById("noteClass").value;
    if(!text){alert("请写下心事再进行封存");return;}
    let now = new Date();
    let fullTime = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    let arr = getLocalNote();
    arr.unshift({sort:type,content:text,time:fullTime});
    saveLocalNote(arr);
    document.getElementById("noteInput").value="";
    renderAllNote();
}
function clearInput(){document.getElementById("noteInput").value="";}
function deleteSingle(index){
    let arr = getLocalNote();
    arr.splice(index,1);
    saveLocalNote(arr);
    renderAllNote();
}
function renderAllNote(){
    let data = getLocalNote();
    let html = data.length===0?'<div style="text-align:center;color:#948265;padding:20px;">暂未封存任何心事</div>':"";
    data.forEach((item,idx)=>{
        html += `<div class="single-note"><div class="note-type">${item.sort}</div><div class="note-content">${item.content}</div><div class="note-date">记录日期：${item.time}</div><span class="operate" onclick="deleteSingle(${idx})">移除封存</span></div>`;
    });
    document.getElementById("noteListBox").innerHTML = html;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密心事 | 专属独白</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--main:#e05275;--light:#ffd6e0;--text:#4a3b42;--glass:rgba(255,255,255,0.25);}
        body{
            background:linear-gradient(145deg,#fef2f6,#fff4f8,#ffeef3);
            min-height:100vh;font-family:"思源宋体",serif;color:var(--text);
            overflow-x:hidden;position:relative;
            opacity:0;animation:nobleFade 1.5s cubic-bezier(0.22,1,0.36,1) forwards;
            transition:all 0.6s ease;
        }
        @keyframes nobleFade{0%{opacity:0;transform:translateY(30px) scale(0.98);}100%{opacity:1;transform:translateY(0) scale(1);}}
        #partCanvas{position:fixed;inset:0;z-index:-2;pointer-events:none;}
        .nav{text-align:center;padding:25px 0;}
        .nav a{margin:0 12px;padding:8px 18px;border-radius:30px;text-decoration:none;color:var(--text);
        background:var(--glass);backdrop-filter:blur(8px);transition:0.3s;}
        .nav a.active{background:var(--main);color:#fff;}
        h1{text-align:center;color:var(--main);letter-spacing:5px;margin:20px 0;}
        .note-wrap{max-width:520px;margin:50px auto;padding:0 20px;}
        textarea{width:100%;padding:20px;border:1px solid var(--light);border-radius:24px;
        background:rgba(255,255,255,0.55);outline:none;font-size:16px;color:var(--text);resize:none;transition:0.3s;}
        textarea:focus{box-shadow:0 0 15px rgba(224,82,117,0.2);}
        .btn{margin-top:15px;padding:11px 36px;border:none;border-radius:999px;
        background:var(--main);color:#fff;font-size:16px;cursor:pointer;transition:0.3s;}
        .btn:hover{background:#c94665;}
        .tip{margin-top:12px;color:var(--main);text-align:center;}
        .foot{text-align:center;margin:70px 0 30px;font-size:14px;color:#b495a2;}
    </style>
</head>
<body>
<canvas id="partCanvas"></canvas>
<div class="nav">
    <a href="index.html">相恋首页</a>
    <a href="time.html">时光回忆</a>
    <a href="words.html">暖心情话</a>
    <a href="note.html" class="active">私密心事</a>
</div>
<h1>写下心事 · 只为一人</h1>
<div class="note-wrap">
    <textarea id="loveNote" rows="6" placeholder="在这里写下只属于你们的悄悄话与心里话..."></textarea>
    <div style="text-align:center;">
        <button class="btn" onclick="saveNote()">永久封存</button>
        <p class="tip" id="noteTip"></p>
    </div>
</div>
<div class="foot">私人珍藏，无人知晓的温柔独白</div>
<audio id="bgAudio" loop><source src="https://music.163.com/song/media/outer/url?id=1901371911.mp3">
<script>
function saveNote(){
    let val=document.getElementById("loveNote").value.trim();
    if(!val){document.getElementById("noteTip").innerText="请写下你的心里话~";return;}
    localStorage.setItem("secretLoveNote",val);
    document.getElementById("noteTip").innerText="心意已永久封存✨";
    setTimeout(()=>document.getElementById("noteTip").innerText="",2200);
}
window.onload=()=>{let old=localStorage.getItem("secretLoveNote");if(old)document.getElementById("loveNote").value=old;};
const audio=document.getElementById("bgAudio");audio.volume=0.25;
document.addEventListener("click",()=>audio.play().catch(e=>{}),{once:true});
const canvas=document.getElementById("partCanvas"),ctx=canvas.getContext("2d");
let particles=[];
function setSize(){canvas.width=innerWidth;canvas.height=innerHeight;initPart();}
function initPart(){particles=[];for(let i=0;i<150;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.4,sx:Math.random()*0.2-0.1,sy:Math.random()*0.2-0.1,color:Math.random()>0.5?"#ffb8cc":"#f8c8d8"});}
function drawPart(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();p.x+=p.sx;p.y+=p.sy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});
requestAnimationFrame(drawPart);}
addEventListener("resize",setSize);setSize();drawPart();
</script>
</body>
</html>

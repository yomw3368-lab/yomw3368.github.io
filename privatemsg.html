<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐秘留言 | 相恋主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .wrap{
            max-width:600px;
            margin:0 auto;
        }
        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:30px;
        }
        textarea{
            width:100%;
            height:130px;
            background:rgba(0,0,0,0.2);
            border:1px solid #d4af37;
            border-radius:15px;
            padding:15px;
            color:#d4af37;
            outline:none;
        }
        .btn-group{
            margin:15px 0;
        }
        button{
            padding:8px 20px;
            margin-right:10px;
            background:#d4af37;
            color:#2b221a;
            border:none;
            border-radius:20px;
            cursor:pointer;
        }
        .secret-item{
            border-bottom:1px solid rgba(212,175,55,0.2);
            padding:12px 0;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="time.html">时光回忆</a>
        <a href="words.html">百件小事</a>
        <a href="note.html">私密心事</a>
        <a href="message.html">公开留言</a>
        <a href="privatemsg.html" class="active">隐秘留言</a>
        <a href="diary.html">恋爱日记</a>
    </div>

    <div class="wrap">
        <h2>专属隐秘留言</h2>
        <textarea id="secretTxt" placeholder="只属于彼此的悄悄话"></textarea>
        <div class="btn-group">
            <button onclick="saveSecret()">保存留言</button>
            <button onclick="clearSecret()">清空记录</button>
        </div>
        <div id="secretList"></div>
    </div>

<script>
const secretKey = "secret_msg_list";
function getData(){
    return JSON.parse(localStorage.getItem(secretKey) || "[]");
}
function render(){
    let arr = getData();
    let html = "";
    arr.forEach(item=>{
        html += `<div class="secret-item">${item}</div>`;
    })
    document.getElementById("secretList").innerHTML = html;
}
function saveSecret(){
    let val = document.getElementById("secretTxt").value.trim();
    if(!val)return;
    let arr = getData();
    arr.unshift(val);
    localStorage.setItem(secretKey,JSON.stringify(arr));
    document.getElementById("secretTxt").value = "";
    render();
}
function clearSecret(){
    if(confirm("确定清空所有隐秘留言？")){
        localStorage.removeItem(secretKey);
        render();
    }
}
window.onload = render;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
    <title>恋爱酷跑 | 休闲小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            overflow-x: hidden;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .title{text-align:center;font-size:2rem;margin-bottom:20px;letter-spacing:2px;}
        .tip{text-align:center;color:#f0d88c;margin-bottom:15px;}
        #gameBox{
            width:320px;height:500px;margin:0 auto;border:2px solid #d4af37;
            background:#000;position:relative;overflow:hidden;
        }
        .player{
            width:40px;height:60px;background:#fff;position:absolute;
            bottom:30px;left:50%;transform:translateX(-50%);
        }
        .block{
            width:40px;height:60px;background:#666;position:absolute;bottom:30px;
        }
        .score-text{position:absolute;top:10px;left:10px;color:#fff;font-size:18px;}
        .game-over{
            position:absolute;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.85);color:#fff;text-align:center;
            padding-top:180px;display:none;
        }
        .restart{
            margin-top:20px;padding:8px 20px;background:#fff;color:#000;
            border:none;border-radius:6px;cursor:pointer;
        }
        .rank-box{
            max-width:320px;margin:30px auto 0;padding:15px;
            border:1px solid #d4af37;border-radius:15px;
            background:rgba(212,175,55,0.1);
        }
        .rank-title{text-align:center;font-size:1.3rem;margin-bottom:15px;}
        .rank-item{
            display:flex;justify-content:space-between;padding:8px 0;
            border-bottom:1px solid rgba(212,175,55,0.2);
        }
        .empty-rank{text-align:center;padding:20px;color:#f0d88c;}
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="time.html">时光回忆</a>
        <a href="words.html">百件小事</a>
        <a href="note.html">私密心事</a>
        <a href="message.html">公开留言</a>
        <a href="privatemsg.html">隐秘留言</a>
        <a href="diary.html">恋爱日记</a>
        <a href="lovecool.html" class="active">恋爱酷跑</a>
    </div>

    <h2 class="title">恋爱酷跑</h2>
    <p class="tip">左右滑动切换道路躲避障碍</p>

    <div id="gameBox">
        <div class="score-text">分数：<span id="score">0</span></div>
        <div class="player" id="player"></div>
        <div class="game-over" id="gameOver">
            <div>游戏结束</div>
            <div>本次得分：<span id="finalScore">0</span></div>
            <button class="restart" onclick="startGame()">重新开始</button>
        </div>
    </div>

    <div class="rank-box">
        <div class="rank-title">游戏高分排行榜</div>
        <div id="rankList"></div>
    </div>

<script>
let gameRun,score=0,speed=6,isPlay=false;
let player=document.getElementById("player");
let gameBox=document.getElementById("gameBox");
let gameOver=document.getElementById("gameOver");
let scoreDom=document.getElementById("score");
let finalScore=document.getElementById("finalScore");
let blockArr=[];
let roadPos=[60,140,220];
let nowRoad=1;

function getRank(){
    return JSON.parse(localStorage.getItem("loveGameRank")||"[]");
}
function saveRank(s){
    let list=getRank();
    list.push(s);
    list.sort((a,b)=>b-a);
    if(list.length>10)list.length=10;
    localStorage.setItem("loveGameRank",JSON.stringify(list));
    renderRank();
}
function renderRank(){
    let list=getRank();
    let html="";
    if(list.length===0){
        html='<div class="empty-rank">暂无游戏记录</div>';
    }else{
        list.forEach((item,i)=>{
            html+=`<div class="rank-item"><span>第${i+1}名</span><span>${item}分</span></div>`;
        })
    }
    document.getElementById("rankList").innerHTML=html;
}

function startGame(){
    score=0;speed=6;nowRoad=1;isPlay=true;
    scoreDom.innerText=0;
    gameOver.style.display="none";
    blockArr.forEach(b=>b.remove());
    blockArr=[];
    clearInterval(gameRun);
    player.style.left=roadPos[nowRoad]+"px";
    gameRun=setInterval(gameUpdate,25);
}

function gameUpdate(){
    score++;
    scoreDom.innerText=score;
    if(score%500===0&&speed<12)speed+=0.5;
    if(Math.random()>0.92){
        let r=Math.floor(Math.random()*3);
        let b=document.createElement("div");
        b.className="block";
        b.style.left=roadPos[r]+"px";
        b.style.top="-60px";
        gameBox.appendChild(b);
        blockArr.push(b);
    }
    blockArr.forEach((b,idx)=>{
        let t=parseInt(b.style.top)||-60;
        b.style.top=(t+speed)+"px";
        let pTop=500-90;
        if(t+60>pTop&&t<500-30){
            if(b.style.left===player.style.left){
                gameEnd();
            }
        }
        if(t>500)b.remove(),blockArr.splice(idx,1);
    })
}

function gameEnd(){
    isPlay=false;
    clearInterval(gameRun);
    finalScore.innerText=score;
    gameOver.style.display="block";
    saveRank(score);
}

document.addEventListener("keydown",e=>{
    if(!isPlay)return;
    if(e.key==="ArrowLeft"&&nowRoad>0)nowRoad--;
    if(e.key==="ArrowRight"&&nowRoad<2)nowRoad++;
    player.style.left=roadPos[nowRoad]+"px";
})

let startX=0;
gameBox.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
gameBox.addEventListener("touchend",e=>{
    if(!isPlay)return;
    let endX=e.changedTouches[0].clientX;
    let d=endX-startX;
    if(d<-30&&nowRoad>0)nowRoad--;
    if(d>30&&nowRoad<2)nowRoad++;
    player.style.left=roadPos[nowRoad]+"px";
})

window.onload=function(){
    renderRank();
    startGame();
}
</script>
</body>
</html>

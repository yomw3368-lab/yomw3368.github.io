<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相恋主页 | 岁岁相依</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            position: relative;
            overflow-x: hidden;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star, .heart {
            position: absolute;
            opacity: 0.7;
            animation: float 8s linear infinite;
        }
        .star {
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
        }
        .heart {
            width: 20px;
            height: 20px;
            background: #d4af37;
            clip-path: path("M10 3 C12 0, 16 0, 18 3 C20 6, 10 15, 10 15 C10 15 0 6, 2 3 C4 0, 8 0, 10 3 Z");
        }
        @keyframes float {
            0% {transform: translateY(100vh) rotate(0deg);opacity: 0;}
            10% {opacity: 0.7;}
            90% {opacity: 0.7;}
            100% {transform: translateY(-100vh) rotate(360deg);opacity: 0;}
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 12px 30px;
            border-radius: 30px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .title-section {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }
        .main-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            animation: fadeInUp 1s ease;
        }
        .divider {
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
            margin: 0 auto 30px;
        }
        .dynamic-greeting {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #f0d88c;
            animation: fadeInUp 1.2s ease;
        }
        .love-quote {
            font-size: 1.3rem;
            line-height: 2;
            color: #e0c880;
            animation: fadeInUp 1.4s ease;
        }
        @keyframes fadeInUp {
            from {opacity: 0;transform: translateY(20px);}
            to {opacity: 1;transform: translateY(0);}
        }
        .count-section {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .count-btn {
            display: block;
            width: 85%;
            max-width: 400px;
            margin: 0 auto 20px;
            padding: 18px 20px;
            border-radius: 30px;
            background: #d4af37;
            color: #2b221a;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            animation: breathe 3s ease-in-out infinite;
        }
        .count-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
        }
        @keyframes breathe {
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.02);}
        }
        .days-info {
            font-size: 1.4rem;
            color: #d4af37;
            margin-bottom: 20px;
            background: rgba(212, 175, 55, 0.15);
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
        }
        .progress-tip {
            font-size: 1.1rem;
            color: #e0c880;
            margin-top: 10px;
        }
        .safe-bottom {height: 80px;}
        .admin-btn{
            position:fixed;
            bottom:20px;
            right:20px;
            padding:10px 15px;
            background:#d4af37;
            color:#2b221a;
            border-radius:20px;
            text-decoration:none;
            z-index:999;
        }
    </style>
</head>
<body>
    <div class="decoration" id="decoration"></div>

    <div class="nav">
        <a href="index.html" class="active">相恋首页</a>
        <a href="memory.html">时光回忆</a>
        <a href="words.html">百件小事</a>
        <a href="secret.html">私密心事</a>
        <a href="public.html">公开留言</a>
        <a href="hidden.html">隐秘留言</a>
    </div>

    <div class="title-section">
        <h1 class="main-title">岁岁相依 · 满心予你</h1>
        <div class="divider"></div>
        <p class="dynamic-greeting" id="dynamicGreeting"></p>
        <div class="love-quote">
            世间风月皆过客<br>
            唯有良人入心窝<br>
            朝暮相伴，情深不渝
        </div>
    </div>

    <div class="count-section">
        <button class="count-btn" id="countBtn">相恋典藏 · 携手共度 <span id="totalDays">0</span> 朝夕</button>
        <div class="days-info">相恋总天数：<span id="daysText">0</span> 天</div>
        <p class="progress-tip" id="progressTip">已完成 <span id="completedCount">0</span>/100 件小事</p>
    </div>

    <a href="visitor.html" class="admin-btn">访客管理</a>
    <div class="safe-bottom"></div>

<script>
// ========== 权限设置 白名单IP ==========
const whiteListIP = ["60.24.248.62"];
const blackListIP = [];
let enterTime = Date.now();

// IP权限验证
async function checkPower(){
    let ip = "";
    try{
        let res = await fetch("https://api64.ipify.org?format=json");
        let d = await res.json();
        ip = d.ip;
    }catch(e){ip="未知IP"}

    if(whiteListIP.length > 0 && !whiteListIP.includes(ip)){
        document.body.innerHTML="<div style='text-align:center;padding-top:120px;font-size:22px;color:#d4af37;'>暂无访问权限</div>";
        return false;
    }
    if(blackListIP.includes(ip)){
        document.body.innerHTML="<div style='text-align:center;padding-top:120px;font-size:22px;color:#d4af37;'>已禁止访问</div>";
        return false;
    }
    return ip;
}

// 保存访客数据+停留时长
async function saveVisitor(ip){
    const stayTime = Math.floor((Date.now()-enterTime)/1000);
    const info = {
        time:new Date().toLocaleString(),
        ip:ip,
        device:navigator.userAgent,
        page:location.pathname,
        staySecond:stayTime
    };
    let all = JSON.parse(localStorage.getItem("cloudVisitorData")||"[]");
    all.push(info);
    localStorage.setItem("cloudVisitorData",JSON.stringify(all));
}

window.addEventListener("beforeunload",async()=>{
    let ip = await checkPower();
    if(ip) saveVisitor(ip);
})

// 相恋起始日期
const LOVE_START_DATE = new Date("2025-09-14");
const completedKey = "love_things_completed";

// 漂浮星星爱心
function createDecoration() {
    const container = document.getElementById("decoration");
    for (let i = 0; i < 30; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = `${Math.random() * 100}%`;
        star.style.animationDuration = `${6 + Math.random() * 6}s`;
        star.style.animationDelay = `${Math.random() * 8}s`;
        container.appendChild(star);
    }
    for (let i = 0; i < 10; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.animationDuration = `${8 + Math.random() * 6}s`;
        heart.style.animationDelay = `${Math.random() * 8}s`;
        container.appendChild(heart);
    }
}

// 分时问候语
function updateGreeting() {
    const hour = new Date().getHours();
    let greeting;
    if (hour >= 5 && hour < 12) greeting = "早安，今天也要和你好好相爱呀";
    else if (hour >= 12 && hour < 18) greeting = "午安，和你在一起的每一刻都很温柔";
    else if (hour >= 18 && hour < 22) greeting = "傍晚好，和你一起吹过的风都带着甜";
    else greeting = "晚安，该睡觉啦，梦里也要和你相遇";
    document.getElementById("dynamicGreeting").textContent = greeting;
}

// 自动计算相恋天数
function calculateLoveDays() {
    const today = new Date();
    const diffTime = Math.abs(today - LOVE_START_DATE);
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    document.getElementById("totalDays").textContent = diffDays;
    document.getElementById("daysText").textContent = diffDays;
}

// 同步百件小事完成进度
function updateProgress() {
    const completedList = JSON.parse(localStorage.getItem(completedKey) || "[]");
    document.getElementById("completedCount").textContent = completedList.length;
}

// 页面初始化
(async function init(){
    await checkPower();
    createDecoration();
    updateGreeting();
    calculateLoveDays();
    updateProgress();
})()
</script>
</body>
</html>

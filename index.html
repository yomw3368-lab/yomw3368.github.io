<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱意隐晦，岁岁私藏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fdf6f8;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        p {
            font-size: 17px;
            margin: 10px 0;
            line-height: 1.6;
            color: #555;
        }
        .signature {
            margin-top: 30px;
            font-size: 15px;
            color: #777;
        }
    </style>
</head>
<body>
    <h1>爱意隐晦，岁岁私藏</h1>
    <p>山野万里，我独偏爱你这一隅温柔</p >
    <p class="signature">——520</p >
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相恋主页 | 岁岁相依</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--main:#e05275;--light:#ffd6e0;--text:#4a3b42;--glass:rgba(255,255,255,0.25);}
        body{
            background:linear-gradient(145deg,#ffe6ef,#fff0f6,#ffebf2);
            min-height:100vh;font-family:"思源宋体",serif;color:var(--text);
            overflow-x:hidden;position:relative;
            opacity:0;animation:nobleFade 1.5s cubic-bezier(0.22,1,0.36,1) forwards;
            transition:all 0.6s ease;
        }
        @keyframes nobleFade{0%{opacity:0;transform:translateY(30px) scale(0.98);}100%{opacity:1;transform:translateY(0) scale(1);}}
        #partCanvas{position:fixed;inset:0;z-index:-2;pointer-events:none;}
        .nav{text-align:center;padding:25px 0;}
        .nav a{margin:0 12px;padding:8px 18px;border-radius:30px;text-decoration:none;color:var(--text);
        background:var(--glass);backdrop-filter:blur(8px);transition:0.3s;}
        .nav a.active{background:var(--main);color:#fff;}
        .love-icon{font-size:95px;color:var(--main);text-shadow:0 0 20px rgba(224,82,117,0.4);
        margin:20px auto;display:block;animation:nobleBeat 1.4s ease-in-out infinite;cursor:pointer;}
        @keyframes nobleBeat{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.12) rotate(2deg);}}
        h1{font-size:2.4rem;color:var(--main);letter-spacing:6px;text-align:center;margin-bottom:25px;}
        .text-info{max-width:600px;margin:0 auto 40px;font-size:18px;line-height:2.1;text-align:center;color:#6b5760;}
        .badge{margin:0 auto 25px;display:table;padding:10px 32px;
        background:linear-gradient(135deg,#f87494,#e05275);border-radius:999px;color:#fff;box-shadow:0 6px 20px rgba(224,82,117,0.3);}
        .card{margin:15px auto;display:table;padding:16px 40px;background:var(--glass);
        backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.45);border-radius:60px;
        box-shadow:0 8px 25px rgba(180,120,140,0.12);transition:0.4s;font-size:17px;color:var(--main);}
        .card:hover{transform:translateY(-6px);}
        .foot{text-align:center;margin:60px 0 30px;font-size:14px;color:#b495a2;letter-spacing:2px;}
        .float-heart{position:fixed;color:#f487a1;top:-8%;z-index:-1;opacity:0.75;animation:floatDown ease-in-out infinite;}
        @keyframes floatDown{0%{transform:translateY(0) rotate(0deg);opacity:0.8;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
        .sweet-pop{
            position: fixed;top:50%;left:50%;
            transform: translate(-50%,-50%) scale(0.8);
            opacity:0;visibility:hidden;
            padding:30px 45px;background:rgba(255,255,255,0.92);
            backdrop-filter:blur(10px);border-radius:28px;
            box-shadow:0 10px 40px rgba(224,82,117,0.25);
            z-index:999;transition:all 0.5s cubic-bezier(0.22,1,0.36,1);
        }
        .sweet-pop.show{
            transform: translate(-50%,-50%) scale(1);
            opacity:1;visibility:visible;
        }
        .pop-close{margin-top:18px;padding:8px 26px;border-radius:30px;border:none;background:var(--main);color:#fff;cursor:pointer;}
        @media (max-width:768px){h1{font-size:1.9rem;}.love-icon{font-size:75px;}.card{padding:14px 28px;}}
    </style>
</head>
<body>
<canvas id="partCanvas"></canvas>
<div class="nav">
    <a href="index.html" class="active">相恋首页</a>
    <a href="time.html">时光回忆</a>
    <a href="words.html">暖心情话</a>
    <a href="note.html">私密心事</a>
</div>

<div class="love-icon" id="clickLove">❤</div>
<h1>岁岁相依 · 满心予你</h1>
<div class="text-info">
世间风月皆过客<br>唯有良人入心窝<br>朝暮相伴，情深不渝
</div>

<div class="badge">相恋典藏 · 携手共度 <span id="allDays">0</span> 朝夕</div>
<div class="card">相恋总天数：<span id="dayCount">0</span> 天</div>
<div class="card">相伴精准时长：<span id="timeCount">0时0分0秒</span></div>
<div class="card">距离专属纪念日：<span id="memorialCount">0天</span></div>

<div class="foot">始于一见倾心 · 终于余生相守</div>

<div class="sweet-pop" id="popModal">
    <p id="popSentence" style="font-size:18px;color:var(--main);"></p>
    <button class="pop-close" onclick="closePop()">欣然收下</button>
</div>

<audio id="bgAudio" loop preload="metadata">
    <source src="https://music.163.com/song/media/outer/url?id=1901371911.mp3">

<script>
const loveStart = new Date("2025-09-14");
const targetMemorial = new Date("2026-09-14");
function updateLoveTime(){
    let now=new Date(),dif=now-loveStart;
    let d=Math.floor(dif/(1000*60*60*24));
    let h=Math.floor((dif%(1000*60*60*24))/(1000*60*60));
    let m=Math.floor((dif%(1000*60*60))/(1000*60));
    let s=Math.floor((dif%(1000*60))/1000);
    document.getElementById("allDays").innerText=d;
    document.getElementById("dayCount").innerText=d;
    document.getElementById("timeCount").innerText=`${h}时${m}分${s}秒`;
    let mdif=targetMemorial-now;
    document.getElementById("memorialCount").innerText=mdif>0?Math.floor(mdif/(1000*60*60*24))+"天":"良辰已至，喜乐常伴";
}
setInterval(updateLoveTime,1000);updateLoveTime();

function createFloatHeart(){
    let h=document.createElement("div");h.className="float-heart";h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";h.style.fontSize=Math.random()*18+7+"px";
    h.style.animationDuration=Math.random()*5+3+"s";document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
}
setInterval(createFloatHeart,320);

const audio=document.getElementById("bgAudio");audio.volume=0.25;
document.addEventListener("click",()=>audio.play().catch(e=>{}),{once:true});

const sweetWords = [
    "风月入怀，万般美好皆不及你",
    "岁月温良，此生有幸与你相逢",
    "心之所向，目光所及皆是你",
    "揽尽星河万顷，只予一人偏爱",
    "流年漫漫，愿与你朝夕相守",
    "深情不负，岁岁年年皆如初",
    "人间烟火寻常，有你便是晴朗"
];
const popBox = document.getElementById("popModal");
const popText = document.getElementById("popSentence");
document.getElementById("clickLove").addEventListener("click",()=>{
    let ran = sweetWords[Math.floor(Math.random()*sweetWords.length)];
    popText.innerText = ran;
    popBox.classList.add("show");
});
// 点击欣然收下 自动收回弹窗
function closePop(){
    popBox.classList.remove("show");
}

const canvas=document.getElementById("partCanvas"),ctx=canvas.getContext("2d");
let particles=[];
function setSize(){canvas.width=innerWidth;canvas.height=innerHeight;initPart();}
function initPart(){particles=[];for(let i=0;i<150;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.4,sx:Math.random()*0.2-0.1,sy:Math.random()*0.2-0.1,color:Math.random()>0.5?"#ffb8cc":"#f8c8d8"});}
function drawPart(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();p.x+=p.sx;p.y+=p.sy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});
requestAnimationFrame(drawPart);}
addEventListener("resize",setSize);setSize();drawPart();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相恋主页 | 岁岁相依</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --gold:#c89b3c;
            --light:#f3e8c8;
            --text:#3a3222;
            --glass:rgba(255,255,255,0.22);
        }
        body.morning{background:linear-gradient(145deg,#3a3020,#4b3d2a,#5a4a33);}
        body.noon{background:linear-gradient(145deg,#483a26,#594730,#6b543a);}
        body.night{background:linear-gradient(145deg,#2c2316,#3b2f1e,#483a26);}
        body.deepnight{background:linear-gradient(145deg,#1a140c,#251d12,#302518);}
        body{
            min-height:100vh;
            font-family:"思源宋体",serif;
            color:#d8cbae;
            overflow-x:hidden;
            opacity:0;
            animation:nobleFade 1.5s cubic-bezier(0.22,1,0.36,1) forwards;
            transition:all 0.6s ease;
        }
        @keyframes nobleFade{0%{opacity:0;transform:translateY(30px) scale(0.98);}100%{opacity:1;transform:translateY(0) scale(1);}}
        #partCanvas{position:fixed;inset:0;z-index:-2;pointer-events:none;}
        .nav{display:flex;justify-content:center;gap:12px;padding:25px 10px;flex-wrap:wrap;}
        .nav a{
            flex:0 1 auto;min-width:90px;text-align:center;padding:8px 16px;border-radius:30px;
            text-decoration:none;color:#e8d9b9;background:var(--glass);backdrop-filter:blur(8px);
            transition:0.3s;font-size:15px;border:1px solid rgba(200,155,60,0.3);
        }
        .nav a.active{background:var(--gold);color:#fff;}
        .love-icon{font-size:95px;color:var(--gold);text-shadow:0 0 20px rgba(200,155,60,0.5);
        margin:20px auto;display:block;animation:nobleBeat 1.4s ease-in-out infinite;cursor:pointer;}
        @keyframes nobleBeat{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(1.12) rotate(2deg);}}
        h1{font-size:2.4rem;color:var(--gold);letter-spacing:6px;text-align:center;margin-bottom:15px;}
        .divider{width:80%;max-width:400px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:15px auto 30px;}
        .text-info{max-width:600px;margin:0 auto 40px;font-size:18px;line-height:2.1;text-align:center;}
        .greet-txt{text-align:center;color:var(--gold);font-size:17px;margin:10px 0;}
        .badge{margin:0 auto 25px;display:table;padding:10px 32px;
        background:linear-gradient(135deg,#d4b060,#c89b3c);border-radius:999px;color:#fff;box-shadow:0 6px 20px rgba(200,155,60,0.4);}
        .card{margin:15px auto;display:table;padding:16px 40px;background:var(--glass);
        backdrop-filter:blur(12px);border:1px solid rgba(200,155,60,0.3);border-radius:60px;
        box-shadow:0 8px 25px rgba(0,0,0,0.25);transition:0.4s;font-size:17px;color:var(--gold);}
        .card:hover{transform:translateY(-6px);}
        .foot{text-align:center;margin:60px 0 30px;font-size:14px;color:#b8a88a;letter-spacing:2px;}
        .float-heart{position:fixed;color:#d4b060;top:-8%;z-index:-1;opacity:0.65;animation:floatDown ease-in-out infinite;}
        @keyframes floatDown{0%{transform:translateY(0) rotate(0deg);opacity:0.8;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
        .sweet-pop{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);
            opacity:0;visibility:hidden;padding:30px 45px;background:rgba(44,35,22,0.95);
            backdrop-filter:blur(10px);border-radius:28px;box-shadow:0 10px 40px rgba(200,155,60,0.3);
            z-index:999;transition:all 0.5s cubic-bezier(0.22,1,0.36,1);border:1px solid var(--gold);
        }
        .sweet-pop.show{transform:translate(-50%,-50%) scale(1);opacity:1;visibility:visible;}
        .pop-close{margin-top:18px;padding:8px 26px;border-radius:30px;border:none;background:var(--gold);color:#fff;cursor:pointer;}
        .pwd-box{max-width:420px;margin:40px auto;text-align:center;padding:20px;background:var(--glass);border-radius:20px;border:1px solid rgba(200,155,60,0.3);}
        .pwd-tit{color:var(--gold);margin-bottom:15px;font-size:16px;}
        #secretPwd{padding:10px 15px;width:70%;border-radius:30px;border:none;outline:none;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;text-align:center;}
        .pwd-btn{margin-left:10px;padding:10px 20px;background:var(--gold);color:#fff;border:none;border-radius:30px;cursor:pointer;}
        @media (max-width:768px){h1{font-size:1.9rem;}.love-icon{font-size:75px;}.card{padding:14px 28px;}}
    </style>
</head>
<body id="bodyMain">
<canvas id="partCanvas"></canvas>
<div class="nav">
    <a href="index.html" class="active">相恋首页</a>
    <a href="time.html">时光回忆</a>
    <a href="words.html">百件小事</a>
    <a href="note.html">私密心事</a>
    <a href="message.html">公开留言</a>
</div>

<div class="love-icon" id="clickLove">❤</div>
<h1>岁岁相依 · 满心予你</h1>
<div class="divider"></div>
<div class="greet-txt" id="timeGreet"></div>
<div class="text-info">世间风月皆过客<br>唯有良人入心窝<br>朝暮相伴，情深不渝</div>

<div class="badge">相恋典藏 · 携手共度 <span id="allDays">0</span> 朝夕</div>
<div class="card">相恋总天数：<span id="dayCount">0</span> 天</div>
<div class="card">相伴精准时长：<span id="timeCount">0时0分0秒</span></div>
<div class="card">距离专属纪念日：<span id="memorialCount">0天</span></div>

<div class="pwd-box">
    <div class="pwd-tit">输入专属暗号，进入隐秘留言区</div>
    <input type="text" id="secretPwd" placeholder="请输入专属暗号">
    <button class="pwd-btn" onclick="checkPwd()">确认进入</button>
</div>

<div class="foot">始于一见倾心 · 终于余生相守</div>

<div class="sweet-pop" id="popModal">
    <p id="popSentence" style="font-size:18px;color:var(--gold);"></p>
    <button class="pop-close" onclick="closePop()">欣然收下</button>
</div>

<audio id="bgAudio" loop preload="metadata">
    <source src="https://music.163.com/song/media/outer/url?id=1901371911.mp3">

<script>
const rightCode = "owner";
const loveStart = new Date("2025-09-14");
const targetMemorial = new Date("2026-09-14");
const wishList = [
    "愿岁岁年年，朝夕皆有你",
    "风月皆温柔，万事皆顺意",
    "前路漫漫，余生皆甜",
    "心有所念，皆能如愿",
    "人间烟火，平安喜乐",
    "相守朝夕，温柔绵长"
];

// 分时判定+切换样式+自动问候
function setTimeStyle(){
    let h = new Date().getHours();
    let body = document.getElementById("bodyMain");
    let greetDom = document.getElementById("timeGreet");
    if(h >=5 && h <9){
        body.className = "morning";
        greetDom.innerText = "早呀，宝宝";
    }else if(h >=9 && h <17){
        body.className = "noon";
        greetDom.innerText = wishList[Math.floor(Math.random()*wishList.length)];
    }else if(h >=17 && h <23){
        body.className = "night";
        greetDom.innerText = "晚安，该睡觉了";
    }else{
        body.className = "deepnight";
        greetDom.innerText = "怎么还不睡";
    }
}
setTimeStyle();

function updateLoveTime(){
    let now=new Date(),dif=now-loveStart;
    let d=Math.floor(dif/(1000*60*60*24));
    let h=Math.floor((dif%(1000*60*60*24))/(1000*60*60));
    let m=Math.floor((dif%(1000*60*60))/(1000*60));
    let s=Math.floor((dif%(1000*60))/1000);
    document.getElementById("allDays").innerText=d;
    document.getElementById("dayCount").innerText=d;
    document.getElementById("timeCount").innerText=`${h}时${m}分${m}分${s}秒`;
    let mdif=targetMemorial-now;
    document.getElementById("memorialCount").innerText=mdif>0?Math.floor(mdif/(1000*60*60*24))+"天":"良辰已至，喜乐常伴";
}
setInterval(updateLoveTime,1000);updateLoveTime();

function checkPwd(){
    let input = document.getElementById("secretPwd").value.trim();
    input===rightCode?location.href="privatemsg.html":(alert("暗号错误"),document.getElementById("secretPwd").value="");
}
function createFloatHeart(){
    let h=document.createElement("div");h.className="float-heart";h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";h.style.fontSize=Math.random()*18+7+"px";
    h.style.animationDuration=Math.random()*5+3+"s";document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
}
setInterval(createFloatHeart,320);
const audio=document.getElementById("bgAudio");audio.volume=0.25;
document.addEventListener("click",()=>audio.play().catch(e=>{}),{once:true});
const popBox = document.getElementById("popModal");
const popText = document.getElementById("popSentence");
document.getElementById("clickLove").addEventListener("click",()=>{
    popText.innerText=wishList[Math.floor(Math.random()*wishList.length)];
    popBox.classList.add("show");
});
function closePop(){popBox.classList.remove("show");}
const canvas=document.getElementById("partCanvas"),ctx=canvas.getContext("2d");
let particles=[];
function setSize(){canvas.width=innerWidth;canvas.height=innerHeight;initPart();}
function initPart(){particles=[];for(let i=0;i<150;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.4,sx:Math.random()*0.2-0.1,sy:Math.random()*0.2-0.1,color:Math.random()>0.5?"#d4b060":"#e8d9b9"});}
function drawPart(){ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();p.x+=p.sx;p.y+=p.sy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});
requestAnimationFrame(drawPart);}
addEventListener("resize",setSize);setSize();drawPart();
</script>
</body>
</html>

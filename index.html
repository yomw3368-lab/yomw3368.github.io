<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属浪漫 · 岁岁相依</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --main: #e05275;
            --light: #ffd6e0;
            --text: #4a3b42;
            --glass: rgba(255, 255, 255, 0.25);
        }
        body {
            background: radial-gradient(circle at top, #ffe8f0, #fff5f9);
            min-height: 100vh;
            font-family: "思源宋体", "PingFang SC", serif;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
            /* 高级渐入动画 */
            opacity: 0;
            animation: nobleFade 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes nobleFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* 粒子背景画布 */
        #partCanvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }
        /* 顶部主爱心 3D柔跳动 */
        .love-icon {
            font-size: 95px;
            color: var(--main);
            text-shadow: 0 0 20px rgba(224, 82, 117, 0.4);
            margin: 40px 0 10px;
            animation: nobleBeat 1.4s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .love-icon:hover {
            filter: brightness(1.15);
        }
        @keyframes nobleBeat {
            0%,100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.12) rotate(2deg); }
        }
        h1 {
            font-size: 2.4rem;
            color: var(--main);
            font-weight: 500;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 28px;
            text-shadow: 0 3px 8px rgba(224,82,117,0.15);
        }
        .subtitle-text {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 45px;
            font-size: 18px;
            line-height: 2.1;
            color: #6b5760;
            letter-spacing: 1.2px;
        }
        /* 高级渐变纪念徽章 */
        .noble-badge {
            display: block;
            width: fit-content;
            margin: 0 auto 25px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #f87494, #e05275);
            border-radius: 999px;
            color: #fff;
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(224,82,117,0.3);
        }
        /* 轻奢磨砂玻璃卡片 */
        .lux-card {
            width: fit-content;
            margin: 14px auto;
            padding: 16px 40px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 60px;
            box-shadow: 0 8px 25px rgba(180, 120, 140, 0.12);
            transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
            font-size: 17px;
            color: var(--main);
        }
        .lux-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(224,82,117,0.2);
        }
        .end-word {
            text-align: center;
            margin-top: 40px;
            font-size: 1.25rem;
            letter-spacing: 3px;
            color: #5c4a53;
        }
        /* 留言轻奢样式 */
        .note-box {
            max-width: 520px;
            margin: 50px auto 0;
            padding: 0 20px;
        }
        .note-box textarea {
            width: 100%;
            padding: 18px;
            border: 1px solid var(--light);
            border-radius: 24px;
            background: rgba(255,255,255,0.55);
            outline: none;
            font-size: 16px;
            color: var(--text);
            resize: none;
            transition: 0.3s;
        }
        .note-box textarea:focus {
            border-color: var(--main);
            box-shadow: 0 0 12px rgba(224,82,117,0.15);
        }
        .save-btn {
            margin-top: 15px;
            padding: 11px 36px;
            border: none;
            border-radius: 999px;
            background: var(--main);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .save-btn:hover {
            background: #c94665;
        }
        .tip-text {
            margin-top: 12px;
            font-size: 14px;
            color: var(--main);
        }
        /* 飘落柔心 */
        .float-heart {
            position: fixed;
            color: #f487a1;
            top: -8%;
            z-index: -1;
            opacity: 0.75;
            animation: floatDown ease-in-out infinite;
        }
        @keyframes floatDown {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        /* 高级情话弹窗 */
        .sweet-pop {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0.8) opacity(0);
            padding: 30px 45px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(224,82,117,0.25);
            z-index: 999;
            transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
        }
        .sweet-pop.show {
            transform: translate(-50%,-50%) scale(1);
            opacity: 1;
        }
        .pop-close {
            margin-top: 18px;
            padding: 8px 26px;
            border-radius: 30px;
            border: none;
            background: var(--main);
            color: #fff;
            cursor: pointer;
        }
        .footer-sign {
            text-align: center;
            margin: 70px 0 40px;
            font-size: 14px;
            color: #b495a2;
            letter-spacing: 2px;
        }
        /* 移动端极致适配 */
        @media (max-width: 768px) {
            h1 { font-size: 1.9rem; letter-spacing: 4px; }
            .love-icon { font-size: 75px; }
            .lux-card { padding: 14px 28px; font-size: 16px; }
            .sweet-pop { padding: 22px 28px; }
        }
    </style>
</head>
<body>
    <!-- 高级粒子花海背景 -->
    <canvas id="partCanvas"></canvas>

    <!-- 情话弹窗 -->
    <div class="sweet-pop" id="popModal">
        <p id="popSentence" style="font-size:18px;color:var(--main);"></p>
        <button class="pop-close" onclick="closePop()">欣然收下</button>
    </div>

    <div class="love-icon" id="clickLove">❤</div>
    <h1>岁岁相依 · 满心予你</h1>
    <div class="subtitle-text">
        世间风月皆过客<br>
        唯有良人入心窝<br>
        朝暮相伴，情深不渝
    </div>

    <div class="noble-badge">
        相恋典藏 · 携手共度 <span id="allDays">0</span> 朝夕
    </div>

    <div class="lux-card">
        相恋总时日：<span id="dayCount">0</span> 天
    </div>
    <div class="lux-card">
        相伴精准时长：<span id="timeCount">0时0分0秒</span>
    </div>
    <div class="lux-card">
        距离专属纪念日：<span id="memorialCount">0天</span>
    </div>

    <p class="end-word">初心不改，偏爱永恒</p>

    <!-- 轻奢留言区 -->
    <div class="note-box">
        <textarea id="loveNote" rows="3" placeholder="写下藏在心底的温柔心语..."></textarea>
        <br>
        <button class="save-btn" onclick="storeNote()">封存心意</button>
        <p class="tip-text" id="noteTip"></p>
    </div>

    <div class="footer-sign">始于一见倾心 · 终于余生相守</div>

    <!-- 轻柔背景音乐 -->
    <audio id="bgAudio" loop preload="metadata">
        <source src="https://music.163.com/song/media/outer/url?id=1901371911.mp3" type="audio/mpeg">
    

<script>
// 自定义相恋起始日期
const loveStart = new Date("2025-09-14");
// 自定义纪念日
const targetMemorial = new Date("2026-09-14");

// 1. 高级计时系统
function updateLoveTime(){
    let now = new Date();
    let diff = now - loveStart;
    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    let m = Math.floor((diff % (1000*60*60)) / (1000*60));
    let s = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById("allDays").innerText = d;
    document.getElementById("dayCount").innerText = d;
    document.getElementById("timeCount").innerText = `${h}时${m}分${s}秒`;

    // 纪念日倒计时
    let memDiff = targetMemorial - now;
    if(memDiff > 0){
        let md = Math.floor(memDiff / (1000*60*60*24));
        document.getElementById("memorialCount").innerText = md + "天";
    }else{
        document.getElementById("memorialCount").innerText = "良辰已至，喜乐常伴";
    }
}
setInterval(updateLoveTime,1000);
updateLoveTime();

// 2. 轻柔飘落爱心
function createFloatHeart(){
    let h = document.createElement("div");
    h.className = "float-heart";
    h.innerHTML = "❤";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = Math.random()*18 + 7 + "px";
    h.style.animationDuration = Math.random()*5 + 3 + "s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
}
setInterval(createFloatHeart,320);

// 3. 本地封存留言
function storeNote(){
    let val = document.getElementById("loveNote").value.trim();
    if(!val){
        document.getElementById("noteTip").innerText = "请留下专属温柔话语~";
        return;
    }
    localStorage.setItem("privateLoveNote",val);
    document.getElementById("noteTip").innerText = "心意永久封存 ✨";
    setTimeout(()=>document.getElementById("noteTip").innerText="",2200);
}
window.onload = ()=>{
    let old = localStorage.getItem("privateLoveNote");
    if(old) document.getElementById("loveNote").value = old;
};

// 4. 背景音乐优雅控制
const audio = document.getElementById("bgAudio");
audio.volume = 0.25;
document.addEventListener("click",()=>audio.play().catch(e=>{}),{once:true});

// 5. 高级唯美情话库
const sweetWords = [
    "风月入怀，万般美好皆不及你",
    "岁月温良，此生有幸与你相逢",
    "心之所向，目光所及皆是你",
    "揽尽星河万顷，只予一人偏爱",
    "流年漫漫，愿与你朝夕相守",
    "深情不负，岁岁年年皆如初",
    "人间烟火寻常，有你便是晴朗"
];
const popBox = document.getElementById("popModal");
const popText = document.getElementById("popSentence");
document.getElementById("clickLove").addEventListener("click",()=>{
    let ran = sweetWords[Math.floor(Math.random()*sweetWords.length)];
    popText.innerText = ran;
    popBox.classList.add("show");
});
function closePop(){
    popBox.classList.remove("show");
}

// 6. 轻奢流动粒子花海背景
const canvas = document.getElementById("partCanvas");
const ctx = canvas.getContext("2d");
let particles = [];
function setSize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    initPart();
}
function initPart(){
    particles = [];
    for(let i=0;i<150;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*2+0.4,
            sx:Math.random()*0.2-0.1,
            sy:Math.random()*0.2-0.1,
            color:Math.random()>0.5?"#ffb8cc":"#f8c8d8"
        })
    }
}
function drawPart(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
        p.x += p.sx;
        p.y += p.sy;
        if(p.x<0)p.x=canvas.width;
        if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;
        if(p.y>canvas.height)p.y=0;
    })
    requestAnimationFrame(drawPart);
}
addEventListener("resize",setSize);
setSize();
drawPart();
</script>
</body>
</html>

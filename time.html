<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光回忆 | 相恋主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            text-decoration: none;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 30px;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav a.active {
            background: #d4af37;
            color: #2b221a;
            box-shadow: 0 0 15px rgba(212,175,55,0.5);
        }
        .nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .container{
            max-width:600px;
            margin:0 auto;
            text-align:center;
        }
        .title{
            font-size:2rem;
            margin-bottom:30px;
            letter-spacing:2px;
        }
        .time-card{
            border:1px solid #d4af37;
            border-radius:20px;
            padding:25px;
            background:rgba(212,175,55,0.1);
            margin-bottom:25px;
        }
        .time-item{
            font-size:1.2rem;
            margin:15px 0;
            color:#f0d88c;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">相恋首页</a>
        <a href="time.html" class="active">时光回忆</a>
        <a href="words.html">百件小事</a>
        <a href="note.html">私密心事</a>
        <a href="message.html">公开留言</a>
        <a href="privatemsg.html">隐秘留言</a>
        <a href="diary.html">恋爱日记</a>
    </div>

    <div class="container">
        <h2 class="title">共度美好时光</h2>
        <div class="time-card">
            <div class="time-item">相恋起始：2025年09月14日</div>
            <div class="time-item" id="totalDay">相伴天数：加载中...</div>
            <div class="time-item">岁岁年年，朝夕相伴</div>
        </div>
    </div>

<script>
const startDate = new Date("2025-09-14");
function countDay(){
    let now = new Date();
    let diff = Math.abs(now - startDate);
    let days = Math.floor(diff / (1000*60*60*24));
    document.getElementById("totalDay").innerText = `相伴天数：${days} 天`;
}
window.onload = countDay;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客管理 | 相恋主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
        }
        body {
            background: #2b221a;
            color: #d4af37;
            min-height: 100vh;
            padding: 20px 15px;
            background-image: linear-gradient(to bottom, rgba(43, 34, 26, 0.95), rgba(43, 34, 26, 0.85));
        }
        .back-btn{
            display:inline-block;
            padding:8px 20px;
            background:#d4af37;
            color:#2b221a;
            text-decoration:none;
            border-radius:20px;
            margin-bottom:25px;
        }
        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:30px;
        }
        .visit-item{
            border:1px solid rgba(212,175,55,0.3);
            border-radius:12px;
            padding:15px;
            margin-bottom:15px;
            background:rgba(212,175,55,0.08);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">返回首页</a>
    <h2>访客访问记录</h2>
    <div id="visitList"></div>

<script>
function getVisitData(){
    return JSON.parse(localStorage.getItem("cloudVisitorData") || "[]");
}
function renderVisit(){
    let list = getVisitData();
    let html = "";
    if(list.length === 0){
        html = "<div style='text-align:center;padding:30px;'>暂无访客记录</div>";
    }else{
        list.reverse().forEach(item=>{
            html += `
            <div class="visit-item">
                <p>访问时间：${item.time}</p>
                <p>停留时长：${item.staySecond} 秒</p>
                <p>访问页面：${item.page}</p>
            </div>
            `;
        })
    }
    document.getElementById("visitList").innerHTML = html;
}
window.onload = renderVisit;
</script>
</body>
</html>
